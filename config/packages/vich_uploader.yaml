vich_uploader:
    db_driver: orm

    mappings:
        salle_images:
            uri_prefix: /images/salles
            upload_destination: '%kernel.project_dir%/public/images/salles'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        equipement_images:
            uri_prefix: /images/equipements
            upload_destination: '%kernel.project_dir%/public/images/equipements'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
