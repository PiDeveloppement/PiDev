# config/services.yaml
parameters:
    database_url: '%env(DATABASE_URL)%'
    profile_images_directory: '%kernel.project_dir%/public/uploads/profile_images'
    ollama_base_url: 'http://127.0.0.1:11434'
    ollama_model: 'llama3.1'
    ollama_timeout_seconds: 60
    gemini_api_key: '%env(GEMINI_API_KEY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\DatabaseService:
        arguments:
            $databaseUrl: '%database_url%'

    App\Service\UserSessionService:
        arguments:
            $requestStack: '@request_stack'
            $logger: '@logger'

    App\Service\Ai\OllamaClient:
        arguments:
            $baseUrl: '%ollama_base_url%'
            $model: '%ollama_model%'
            $timeoutSeconds: '%ollama_timeout_seconds%'

    App\Service\Questionnaire\QuestionGenerator:
        arguments:
            $geminiApiKey: '%gemini_api_key%'
