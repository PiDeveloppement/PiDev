# config/services.yaml
parameters:
    database_url: '%env(DATABASE_URL)%'

    profile_images_directory: '%kernel.project_dir%/public/uploads/profile_images'
    # 1. On ajoute le paramètre Gemini ici
    gemini_api_key: '%env(GEMINI_API_KEY)%'

services:
    # configuration par défaut
    _defaults:
        autowire: true
        autoconfigure: true

    # makes classes in src/ available to be used as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Service de base de données
    App\Service\DatabaseService:
        arguments:
            $databaseUrl: '%database_url%'

    # Service de session utilisateur - version simplifiée (pas besoin d'alias)
    App\Service\UserSessionService:
        arguments:
            $requestStack: '@request_stack'
            $logger: '@logger'
            
    # 2. On ajoute ton service de génération de questions ici
    App\Service\Questionnaire\QuestionGenerator:
        arguments:
            $geminiApiKey: '%gemini_api_key%'

    # Service de modération de contenu pour questionnaire
    App\Service\Questionnaire\ContentModerationService:
        arguments: []

    # ✅ PAS DE LIGNE SUPPLÉMENTAIRE POUR UserSessionService !
    # L'autowiring s'en charge automatiquement